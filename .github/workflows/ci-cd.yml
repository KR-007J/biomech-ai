name: Biomech AI - CI/CD Pipeline (Phase 4)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM

jobs:
  # ==================== LINTING & CODE QUALITY ====================
  
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8 black isort mypy pytest-cov
      
      - name: Format check (Black)
        run: |
          cd backend
          black --check --line-length=100 .
      
      - name: Import sorting (isort)
        run: |
          cd backend
          isort --check-only --profile black .
      
      - name: Lint with flake8
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100
      
      - name: Type checking (mypy)
        run: |
          cd backend
          mypy . --ignore-missing-imports --no-error-summary || true

  # ==================== TESTING ====================
  
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-xdist
      
      - name: Run unit tests
        run: |
          cd backend
          pytest test_main.py -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          REDIS_URL: redis://localhost:6379
      
      - name: Run integration tests
        run: |
          cd backend
          pytest test_integration.py -v --cov=. --cov-report=xml
        env:
          REDIS_URL: redis://localhost:6379
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella

  # ==================== SECURITY SCANNING ====================
  
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install bandit safety pip-audit
      
      - name: Bandit security check
        run: |
          cd backend
          bandit -r . -f json -o bandit-report.json || true
      
      - name: Safety check (vulnerable deps)
        run: |
          cd backend
          safety check --json || true
      
      - name: pip-audit (dependency audit)
        run: |
          cd backend
          pip-audit --desc || true
      
      - name: OWASP dependency check
        uses: jeremylong/DependencyCheck_Action@main
        with:
          project: 'Biomech AI'
          path: '.'
          format: 'JSON'
          args: >
            --enableExperimental

  # ==================== PERFORMANCE TESTING ====================
  
  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-benchmark locust
      
      - name: Run performance benchmarks
        run: |
          cd backend
          pytest test_main.py -v --benchmark-only --benchmark-json=benchmark.json || true
      
      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: Biomech AI Benchmarks
          tool: customJson
          output-file-path: backend/benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

  # ==================== BUILD DOCKER IMAGE ====================
  
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: success()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: biomech-ai:${{ github.sha }},biomech-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOYMENT ====================
  
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/biomech-ai:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/biomech-ai:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Deploy to staging (Cloud Run)
        run: |
          echo "Deploying to Google Cloud Run staging environment"
          # Add actual deployment commands here
      
      - name: Run smoke tests
        run: |
          cd backend
          pip install httpx
          python -m pytest test_integration.py -k "health" -v

  # ==================== NOTIFICATION ====================
  
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "Pipeline failed!"
            exit 1
          fi
          echo "Pipeline succeeded!"
      
      - name: Send Slack notification (success)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Biomech AI CI/CD Pipeline Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Biomech AI Build Successful*\n Branch: `${{ github.ref }}`\n Commit: `${{ github.sha }}`"
                  }
                }
              ]
            }
      
      - name: Send Slack notification (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Biomech AI CI/CD Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔴 *Biomech AI Build Failed*\n Branch: `${{ github.ref }}`\n Check: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                  }
                }
              ]
            }
