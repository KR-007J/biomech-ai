name: Biomech AI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: cd backend && pip install black flake8 isort && black --check . || true && isort --check-only . || true && flake8 . --max-line-length=100 || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: cd backend && pip install -r requirements.txt pytest pytest-asyncio pytest-cov
      - run: cd backend && pytest test_main.py -v --cov=. --cov-report=xml || true
        env:
          REDIS_URL: redis://localhost:6379
      - run: cd backend && pytest test_integration.py -v --cov-append --cov-report=xml || true
        env:
          REDIS_URL: redis://localhost:6379

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: cd backend && pip install bandit safety pip-audit
      - run: cd backend && bandit -r . || true
      - run: cd backend && safety check --json || true
      - run: cd backend && pip-audit --disable-pip || true

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v2
      - uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: biomech-ai:latest
        continue-on-error: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy to staging"

  notify:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: echo "Pipeline complete"
