name: Biomech AI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install workflow validator dependency
        run: pip install pyyaml
      - name: Install frontend dependencies
        run: npm ci
      - name: Create frontend config placeholder
        run: |
          if [ ! -f static/js/secrets.js ]; then
            printf 'window.BIOMECH_CONFIG = window.BIOMECH_CONFIG || {};\n' > static/js/secrets.js
          fi
      - name: Validate frontend and workflow
        run: npm test

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        working-directory: backend
        run: pytest test_main.py -v --cov=. --cov-report=xml
        env:
          REDIS_URL: redis://localhost:6379
      - name: Run integration tests
        working-directory: backend
        run: pytest test_integration.py -v --cov-append --cov-report=xml
        env:
          REDIS_URL: redis://localhost:6379
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run Bandit
        working-directory: backend
        run: bandit -r . -x ./test_main.py,./test_integration.py -s B101,B104,B105,B311,B324,B404 -f json -o bandit_report.json
      - name: Run Pip Audit
        working-directory: backend
        timeout-minutes: 5
        run: pip-audit -r requirements.txt
        continue-on-error: true
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: backend/bandit_report.json
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [frontend, backend, security]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: biomech-ai:latest

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy staging
        run: echo "Deploying to staging environment..."

  notify:
    runs-on: ubuntu-latest
    needs: [frontend, backend, security, build, deploy]
    if: always()
    steps:
      - name: Final Status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "CI/CD Pipeline failed."
            exit 1
          else
            echo "CI/CD Pipeline completed successfully."
          fi
